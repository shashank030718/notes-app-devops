name: Build and Deploy to AWS

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: ap-south-1
  ECR_BACKEND: notes-app-backend
  ECR_FRONTEND: notes-app-frontend
  ECS_CLUSTER: notes-app-cluster
  ECS_SERVICE: notes-app-backend

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build & push backend image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_BACKEND:latest ./backend
        docker push $ECR_REGISTRY/$ECR_BACKEND:latest
        echo "backend_image=$ECR_REGISTRY/$ECR_BACKEND:latest" >> $GITHUB_OUTPUT

    - name: Build & push frontend image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_FRONTEND:latest ./frontend
        docker push $ECR_REGISTRY/$ECR_FRONTEND:latest

    - name: Force ECS redeployment
      run: |
        aws ecs update-service \
          --cluster $ECS_CLUSTER \
          --service $ECS_SERVICE \
          --force-new-deployment \
          --region $AWS_REGION

    - name: Wait for deployment to complete
      run: |
        aws ecs wait services-stable \
          --cluster $ECS_CLUSTER \
          --services $ECS_SERVICE \
          --region $AWS_REGION
        echo "✅ Deployment complete!"